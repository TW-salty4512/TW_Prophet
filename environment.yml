# TW_Prophet conda 環境定義
# 個人パス (prefix) を含まないポータブル版
#
# 環境作成:
#   conda env create -f environment.yml
#   conda activate tw_prophet
#
# または pip のみで:
#   pip install -r requirements.txt

name: tw_prophet
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.9
  - pip
  - pip:
      - numpy>=1.23,<2.1
      - pandas>=2.2,<3.0
      - matplotlib>=3.9,<4.0
      - scikit-learn>=1.2,<2.0
      - xgboost>=1.7,<3.0
      - joblib>=1.4
      - tsaug>=0.2
      - pyodbc>=5.2
      - pymysql>=1.1
      - mysql-connector-python>=9.0
      - sqlalchemy>=2.0,<3.0
      - pandas-datareader>=0.10
      - fastapi>=0.110,<1.0
      - uvicorn[standard]>=0.27,<1.0
      - jinja2>=3.1,<4.0
      - pydantic>=2.0
